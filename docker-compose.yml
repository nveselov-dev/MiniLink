version: '3.8'

services:
  app:
    build: .
    container_name: minilink-api
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - MONGO_URI=mongodb://mongo:27017/minilink
    depends_on:
      - mongo
    volumes:
      - .:/app
      - /app/node_modules
    restart: unless-stopped
    command: npx tsx watch src/server.ts

  mongo:
    image: mongo:7.0
    container_name: minilink-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

volumes:
  mongo-data: